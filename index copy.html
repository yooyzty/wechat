<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信聊天截图生成器 - 2026版</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2canvas for screenshot -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
            background-color: #f3f4f6;
        }

        /* 模拟手机屏幕容器 */
        .phone-container {
            width: 375px;
            height: 812px;
            background-color: #F3F3F3;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 40px;
            border: 12px solid #333;
        }

        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 微信 Android 气泡样式 */
        .bubble-left {
            background-color: #FFFFFF;
            border-radius: 6px;
            position: relative;
        }
        .bubble-left::before {
            content: "";
            position: absolute;
            left: -5px;
            top: 14px;
            width: 0;
            height: 0;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-right: 6px solid #FFFFFF;
        }

        .bubble-right {
            background-color: #95EC69;
            border-radius: 6px;
            position: relative;
        }
        .bubble-right::before {
            content: "";
            position: absolute;
            right: -5px;
            top: 14px;
            width: 0;
            height: 0;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-left: 6px solid #95EC69;
        }

        /* 微信顶部标题栏 Android 风格 */
        .android-header {
            height: 56px;
            background-color: #F3F3F3;
            display: flex;
            align-items: center;
            padding: 0 16px;
            justify-content: space-between;
            border-bottom: 1px solid #E5E5E5;
        }

        /* 编辑器侧边栏样式 */
        .editor-sidebar {
            width: 450px;
            background: white;
            height: 100vh;
            overflow-y: auto;
            border-right: 1px solid #e5e7eb;
            padding: 24px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 模拟微信默认头像
        const DEFAULT_AVATAR_FRIEND = 'https://api.dicebear.com/7.x/avataaars/svg?seed=friend';
        const DEFAULT_AVATAR_ME = 'https://api.dicebear.com/7.x/avataaars/svg?seed=me';

        function App() {
            // 从 localStorage 加载数据
            const loadData = (key, defaultValue) => {
                try {
                    const saved = localStorage.getItem(key);
                    return saved ? JSON.parse(saved) : defaultValue;
                } catch (err) {
                    console.error(`加载数据失败 [${key}]:`, err);
                    return defaultValue;
                }
            };

            // 基础设置
            const [friendName, setFriendName] = useState(loadData('friendName', '微信好友'));
            const [friendAvatar, setFriendAvatar] = useState(loadData('friendAvatar', DEFAULT_AVATAR_FRIEND));
            const [myAvatar, setMyAvatar] = useState(loadData('myAvatar', DEFAULT_AVATAR_ME));

            // 聊天消息列表
            const [messages, setMessages] = useState(loadData('messages', [
                {
                    id: 1,
                    type: 'time',
                    content: '14:25'
                },
                {
                    id: 2,
                    type: 'friend',
                    content: '你好呀！欢迎使用安卓微信截图生成器。',
                },
                {
                    id: 3,
                    type: 'me',
                    content: '这看起来很真实！所有的细节都还原了。',
                }
            ]));

            // 保存到 localStorage
            useEffect(() => {
                try {
                    localStorage.setItem('friendName', JSON.stringify(friendName));
                    localStorage.setItem('friendAvatar', JSON.stringify(friendAvatar));
                    localStorage.setItem('myAvatar', JSON.stringify(myAvatar));
                    localStorage.setItem('messages', JSON.stringify(messages));
                } catch (err) {
                    if (err.name === 'QuotaExceededError') {
                        console.error('存储空间已满，无法保存更多数据');
                    } else {
                        console.error('保存数据失败:', err);
                    }
                }
            }, [friendName, friendAvatar, myAvatar, messages]);

            // 编辑状态（顶部表单）
            const [editingId, setEditingId] = useState(null);
            
            // 内联编辑状态（列表直接修改）
            const [inlineEditingId, setInlineEditingId] = useState(null);
            const [inlineEditValue, setInlineEditValue] = useState('');

            // 新消息表单状态
            const [newMessage, setNewMessage] = useState({
                type: 'friend',
                content: '',
            });

            const previewRef = useRef(null);

            // 处理头像上传并压缩
            const handleAvatarUpload = (e, target) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        // 创建 Canvas 进行压缩
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 200; // 头像不需要太大，200px 足够
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_SIZE) {
                                height *= MAX_SIZE / width;
                                width = MAX_SIZE;
                            }
                        } else {
                            if (height > MAX_SIZE) {
                                width *= MAX_SIZE / height;
                                height = MAX_SIZE;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // 导出为压缩后的 Base64
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.8);
                        
                        if (target === 'friend') setFriendAvatar(compressedBase64);
                        else setMyAvatar(compressedBase64);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            // 添加或保存消息
            const saveMessage = () => {
                if (!newMessage.content.trim()) return;
                
                if (editingId) {
                    setMessages(messages.map(msg => 
                        msg.id === editingId ? { ...newMessage, id: editingId } : msg
                    ));
                    setEditingId(null);
                } else {
                    setMessages([...messages, { ...newMessage, id: Date.now() }]);
                }
                
                setNewMessage({ 
                    ...newMessage, 
                    content: '',
                });
            };

            // 编辑消息（顶部表单）
            const startEdit = (msg) => {
                setNewMessage({ ...msg });
                setEditingId(msg.id);
                // 同步取消内联编辑
                setInlineEditingId(null);
            };

            // 取消编辑（顶部表单）
            const cancelEdit = () => {
                setEditingId(null);
                setNewMessage({
                    ...newMessage,
                    content: '',
                });
            };

            // 开始内联编辑
            const startInlineEdit = (msg) => {
                setInlineEditingId(msg.id);
                setInlineEditValue(msg.content);
                // 也要同步取消顶部表单的编辑状态，防止冲突
                setEditingId(null);
            };

            // 实时同步内联编辑
            const handleInlineChange = (id, value) => {
                setInlineEditValue(value);
                setMessages(messages.map(msg => 
                    msg.id === id ? { ...msg, content: value } : msg
                ));
            };

            // 退出内联编辑
            const exitInlineEdit = () => {
                setInlineEditingId(null);
                setInlineEditValue('');
            };

            // 移动消息
            const moveMessage = (index, direction) => {
                const newMessages = [...messages];
                const targetIndex = index + direction;
                if (targetIndex < 0 || targetIndex >= newMessages.length) return;
                [newMessages[index], newMessages[targetIndex]] = [newMessages[targetIndex], newMessages[index]];
                setMessages(newMessages);
            };

            // 删除消息
            const deleteMessage = (id) => {
                setMessages(messages.filter(msg => msg.id !== id));
            };

            // 拖拽排序逻辑
            const [draggedItemIndex, setDraggedItemIndex] = useState(null);

            const onDragStart = (e, index) => {
                setDraggedItemIndex(index);
                e.dataTransfer.effectAllowed = 'move';
                // 为拖拽中的元素添加透明度
                e.target.style.opacity = '0.5';
            };

            const onDragEnd = (e) => {
                e.target.style.opacity = '1';
                setDraggedItemIndex(null);
            };

            const onDragOver = (e, index) => {
                e.preventDefault();
                if (draggedItemIndex === null || draggedItemIndex === index) return;
                
                const newMessages = [...messages];
                const item = newMessages.splice(draggedItemIndex, 1)[0];
                newMessages.splice(index, 0, item);
                
                setMessages(newMessages);
                setDraggedItemIndex(index);
            };

            // 导出截图 (极致稳定版 - 彻底解决所有排版/文字/居中问题)
            const exportImage = () => {
                const element = previewRef.current;
                if (!element) return;

                // 1. 确保所有图片完全加载
                const images = element.querySelectorAll('img');
                const imagePromises = Array.from(images).map(img => {
                    if (img.complete) return Promise.resolve();
                    return new Promise(resolve => {
                        img.onload = resolve;
                        img.onerror = resolve;
                    });
                });

                Promise.all(imagePromises).then(() => {
                    // 2. 配置 html2canvas
                    html2canvas(element, {
                        useCORS: true,
                        allowTaint: true,
                        scale: 3, 
                        backgroundColor: '#F3F3F3',
                        logging: false,
                        width: 375,
                        height: 812,
                        x: 0,
                        y: 0,
                        scrollX: 0,
                        scrollY: 0,
                        onclone: (clonedDoc) => {
                            const clonedElement = clonedDoc.querySelector('.phone-container');
                            if (clonedElement) {
                                // 彻底锁定容器样式
                                Object.assign(clonedElement.style, {
                                    width: '375px',
                                    height: '812px',
                                    borderRadius: '0',
                                    border: 'none',
                                    boxShadow: 'none',
                                    transform: 'none',
                                    position: 'relative',
                                    overflow: 'hidden',
                                    margin: '0',
                                    padding: '0'
                                });

                                // 强制修复导航栏居中和完整显示
                                const header = clonedElement.querySelector('.android-header');
                                if (header) {
                                    Object.assign(header.style, {
                                        display: 'flex',
                                        alignItems: 'center',
                                        justifyContent: 'space-between',
                                        padding: '0 16px',
                                        boxSizing: 'border-box',
                                        height: '80px',
                                        width: '100%'
                                    });
                                    // 找到中间的 flex-1 容器
                                    const midContainer = header.querySelector('.flex-1');
                                    if (midContainer) {
                                        Object.assign(midContainer.style, {
                                            flex: '1',
                                            display: 'flex',
                                            justifyContent: 'center',
                                            alignItems: 'center',
                                            overflow: 'visible',
                                            width: 'auto'
                                        });
                                        const nameSpan = midContainer.querySelector('span');
                                        if (nameSpan) {
                                            Object.assign(nameSpan.style, {
                                                display: 'block',
                                                width: 'auto',
                                                maxWidth: 'none',
                                                textAlign: 'center',
                                                overflow: 'visible',
                                                whiteSpace: 'nowrap',
                                                fontSize: '18px',
                                                visibility: 'visible',
                                                opacity: '1'
                                            });
                                        }
                                    }
                                }

                                // 强制修复底部栏
                                const footer = clonedElement.querySelector('.absolute.bottom-0');
                                if (footer) {
                                    Object.assign(footer.style, {
                                        width: '100%',
                                        height: '56px',
                                        display: 'flex',
                                        alignItems: 'center',
                                        padding: '0 8px',
                                        boxSizing: 'border-box'
                                    });
                                }

                                // 强制修复气泡排列和文字
                                const bubbles = clonedElement.querySelectorAll('.bubble-left, .bubble-right');
                                bubbles.forEach(b => {
                                    Object.assign(b.style, {
                                        fontSize: '15px',
                                        lineHeight: '1.4',
                                        padding: '9px 12px',
                                        display: 'inline-block',
                                        verticalAlign: 'top',
                                        boxSizing: 'border-box',
                                        wordBreak: 'break-all',
                                        whiteSpace: 'normal',
                                        margin: '0',
                                        height: 'auto',
                                        minHeight: '0',
                                        maxWidth: '100%'
                                    });
                                });

                                // 强制设置系统字体，防止渲染偏差
                                const allTexts = clonedElement.querySelectorAll('span, div');
                                allTexts.forEach(el => {
                                    el.style.fontFamily = '-apple-system, BlinkMacSystemFont, "PingFang SC", "Heiti SC", "Microsoft YaHei", sans-serif';
                                    el.style.letterSpacing = '0';
                                });
                            }
                        }
                    }).then(canvas => {
                        try {
                            const dataUrl = canvas.toDataURL('image/png', 1.0);
                            const link = document.createElement('a');
                            link.download = `wechat-android-HD-${Date.now()}.png`;
                            link.href = dataUrl;
                            document.body.appendChild(link);
                            link.click();
                            document.body.removeChild(link);
                        } catch (err) {
                            console.error('生成图片失败:', err);
                        }
                    });
                });
            };

            // 按日期分组消息 (保留逻辑以备后用，目前 messages 为扁平数组)
            const groupedMessages = Array.isArray(messages) ? messages : [];

            return (
                <div className="flex h-screen w-full bg-gray-100 overflow-hidden">
                    {/* 左侧：编辑面板 */}
                    <div className="editor-sidebar no-scrollbar">
                        <h1 className="text-2xl font-bold mb-6 text-gray-800">微信截图生成器</h1>
                        
                        {/* 基础设置 */}
                        <section className="mb-8 p-4 bg-gray-50 rounded-xl border border-gray-200">
                            <h2 className="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">基础设置</h2>
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">好友昵称</label>
                                    <input 
                                        type="text" 
                                        className="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 outline-none"
                                        value={friendName}
                                        onChange={(e) => setFriendName(e.target.value)}
                                    />
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">好友头像</label>
                                        <div className="flex items-center gap-2">
                                            <img src={friendAvatar} className="w-10 h-10 rounded-md object-cover border" />
                                            <input 
                                                type="file" 
                                                accept="image/*"
                                                className="hidden" 
                                                id="friend-avatar-input"
                                                onChange={(e) => handleAvatarUpload(e, 'friend')}
                                            />
                                            <label htmlFor="friend-avatar-input" className="text-xs bg-white border border-gray-300 px-2 py-1 rounded cursor-pointer hover:bg-gray-50">更换</label>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">我的头像</label>
                                        <div className="flex items-center gap-2">
                                            <img src={myAvatar} className="w-10 h-10 rounded-md object-cover border" />
                                            <input 
                                                type="file" 
                                                accept="image/*"
                                                className="hidden" 
                                                id="my-avatar-input"
                                                onChange={(e) => handleAvatarUpload(e, 'me')}
                                            />
                                            <label htmlFor="my-avatar-input" className="text-xs bg-white border border-gray-300 px-2 py-1 rounded cursor-pointer hover:bg-gray-50">更换</label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* 添加/编辑消息 */}
                        <section className="mb-8 p-4 bg-gray-50 rounded-xl border border-gray-200">
                            <h2 className="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">
                                {editingId ? '编辑消息' : '添加消息'}
                            </h2>
                            <div className="space-y-4">
                                <div className="flex gap-2">
                                    <button 
                                        onClick={() => setNewMessage({...newMessage, type: 'friend'})}
                                        className={`flex-1 py-2 text-sm rounded-md border transition-all ${newMessage.type === 'friend' ? 'bg-green-600 text-white border-green-600 shadow-sm' : 'bg-white text-gray-600 border-gray-300'}`}
                                    >对方发来</button>
                                    <button 
                                        onClick={() => setNewMessage({...newMessage, type: 'me'})}
                                        className={`flex-1 py-2 text-sm rounded-md border transition-all ${newMessage.type === 'me' ? 'bg-green-600 text-white border-green-600 shadow-sm' : 'bg-white text-gray-600 border-gray-300'}`}
                                    >我发送的</button>
                                    <button 
                                        onClick={() => setNewMessage({...newMessage, type: 'time'})}
                                        className={`flex-1 py-2 text-sm rounded-md border transition-all ${newMessage.type === 'time' ? 'bg-gray-600 text-white border-gray-600 shadow-sm' : 'bg-white text-gray-600 border-gray-300'}`}
                                    >时间/日期</button>
                                </div>
                                <div>
                                    <textarea 
                                        className="w-full p-2 border border-gray-300 rounded-md h-20 outline-none focus:ring-2 focus:ring-green-500 text-sm"
                                        placeholder={newMessage.type === 'time' ? "输入时间或日期 (如: 14:25 或 3月28日 星期五)" : "输入消息内容..."}
                                        value={newMessage.content}
                                        onChange={(e) => setNewMessage({...newMessage, content: e.target.value})}
                                    />
                                </div>
                                <div className="flex gap-2">
                                    {editingId && (
                                        <button 
                                            onClick={cancelEdit}
                                            className="flex-1 py-2 bg-gray-200 text-gray-700 rounded-md font-medium hover:bg-gray-300 transition-colors"
                                        >取消</button>
                                    )}
                                    <button 
                                        onClick={saveMessage}
                                        className="flex-[2] py-2 bg-green-600 text-white rounded-md font-medium hover:bg-green-700 transition-colors shadow-sm"
                                    >
                                        {editingId ? '保存修改' : '添加消息'}
                                    </button>
                                </div>
                            </div>
                        </section>

                        {/* 消息管理 */}
                        <section className="mb-8">
                            <h2 className="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4 flex justify-between items-center">
                                消息列表 (可直接拖动排序)
                                <button onClick={() => setMessages([])} className="text-[10px] text-red-500 hover:underline">清空全部数据</button>
                            </h2>
                            <div className="space-y-2">
                                {messages.map((msg, index) => (
                                    <div 
                                        key={msg.id} 
                                        draggable={inlineEditingId !== msg.id}
                                        onDragStart={(e) => onDragStart(e, index)}
                                        onDragEnd={onDragEnd}
                                        onDragOver={(e) => onDragOver(e, index)}
                                        className={`p-3 bg-white border rounded-lg flex justify-between items-center group transition-all ${inlineEditingId !== msg.id ? 'cursor-move hover:shadow-md' : 'shadow-sm'} ${editingId === msg.id || inlineEditingId === msg.id ? 'border-green-500 ring-1 ring-green-500' : 'border-gray-200'}`}
                                    >
                                        <div className="flex-1 overflow-hidden">
                                            <div className="flex items-center gap-2 mb-1">
                                                <div className="text-gray-300">
                                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/></svg>
                                                </div>
                                                {/* 列表头像 */}
                                                {(msg.type === 'me' || msg.type === 'friend') && (
                                                    <img 
                                                        src={msg.type === 'me' ? myAvatar : friendAvatar} 
                                                        className="w-5 h-5 rounded-sm object-cover border border-gray-100"
                                                    />
                                                )}
                                                <span className={`text-[10px] px-1 rounded ${
                                                    msg.type === 'me' ? 'bg-green-100 text-green-700' : 
                                                    msg.type === 'friend' ? 'bg-gray-100 text-gray-700' : 
                                                    'bg-blue-100 text-blue-700'
                                                }`}>
                                                    {msg.type === 'me' ? '我' : msg.type === 'friend' ? '对方' : '时间'}
                                                </span>
                                            </div>
                                            
                                            {inlineEditingId === msg.id ? (
                                                <div className="pl-5 pr-2 mt-1">
                                                    <textarea 
                                                        autoFocus
                                                        className="w-full p-2 border border-green-500 rounded text-sm focus:outline-none bg-green-50"
                                                        value={inlineEditValue}
                                                        onChange={(e) => handleInlineChange(msg.id, e.target.value)}
                                                        onBlur={exitInlineEdit}
                                                        onKeyDown={(e) => {
                                                            if (e.key === 'Enter' && !e.shiftKey) {
                                                                e.preventDefault();
                                                                exitInlineEdit();
                                                            }
                                                            if (e.key === 'Escape') {
                                                                exitInlineEdit();
                                                            }
                                                        }}
                                                        rows={Math.max(2, inlineEditValue.split('\n').length)}
                                                    />
                                                </div>
                                            ) : (
                                                <p 
                                                    className="text-sm text-gray-700 break-all pl-5 cursor-text hover:text-green-600 transition-colors"
                                                    onClick={() => startInlineEdit(msg)}
                                                    title="点击直接修改"
                                                >
                                                    {msg.content}
                                                </p>
                                            )}
                                        </div>
                                        
                                        {inlineEditingId !== msg.id && (
                                            <div className="flex gap-1 items-center ml-2">
                                                <button 
                                                    onClick={() => deleteMessage(msg.id)}
                                                    className="text-gray-400 hover:text-red-600 p-1 opacity-0 group-hover:opacity-100 transition-opacity"
                                                    title="删除"
                                                >
                                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                ))}
                                {messages.length === 0 && (
                                    <div className="text-center py-10 text-gray-400 text-sm italic">
                                        暂无消息，请在上方添加
                                    </div>
                                )}
                            </div>
                        </section>

                        {/* 导出按钮容器 - 缩小三分之一，不再悬浮，放到底部 */}
                        <div className="w-full flex justify-center py-8">
                            <button 
                                onClick={exportImage}
                                className="w-2/3 py-2.5 bg-green-600 text-white rounded-md font-medium border-2 border-white hover:bg-green-700 transition-colors shadow-sm flex items-center justify-center gap-2"
                            >
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                                保存高清截图
                            </button>
                        </div>
                    </div>

                    {/* 右侧：预览面板 */}
                    <div className="flex-1 flex items-center justify-center p-10 bg-[#333]">
                        <div className="phone-container" ref={previewRef}>
                            {/* 微信顶部导航栏 Android 极致还原 - 稳固对等布局 */}
                            <div className="android-header pt-6 h-[80px] flex items-center px-4">
                                {/* 左侧容器：固定宽度 60px */}
                                <div className="w-[60px] flex-shrink-0 flex items-center">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="cursor-pointer">
                                        <polyline points="15 18 9 12 15 6"></polyline>
                                    </svg>
                                </div>
                                {/* 中间容器：填充剩余空间并居中 */}
                                <div className="flex-1 flex justify-center items-center overflow-hidden">
                                    <span className="text-[18px] font-normal text-black whitespace-nowrap overflow-hidden text-ellipsis text-center">{friendName}</span>
                                </div>
                                {/* 右侧容器：固定宽度 60px (与左侧相等以实现绝对居中) */}
                                <div className="w-[60px] flex-shrink-0 flex justify-end items-center">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                        <circle cx="5" cy="12" r="1.5" fill="black"/>
                                        <circle cx="12" cy="12" r="1.5" fill="black"/>
                                        <circle cx="19" cy="12" r="1.5" fill="black"/>
                                    </svg>
                                </div>
                            </div>

                            {/* 聊天内容区 */}
                            <div className="h-[calc(100%-80px-56px)] overflow-y-auto no-scrollbar px-3 py-4 space-y-4 flex flex-col bg-[#F3F3F3]">
                                {messages.map((msg, index) => {
                                    if (msg.type === 'time') {
                                        return (
                                            <div key={msg.id} className="flex items-center justify-center my-4">
                                                <span className="text-[12.5px] text-gray-400 font-normal tracking-wide">{msg.content}</span>
                                            </div>
                                        );
                                    }
                                    return (
                                        <div key={msg.id} className={`flex ${msg.type === 'me' ? 'flex-row-reverse' : 'flex-row'} items-start gap-2 mb-4`}>
                                            {/* 头像 - Android 为圆角矩形 */}
                                            <img 
                                                src={msg.type === 'me' ? myAvatar : friendAvatar} 
                                                className="w-[42px] h-[42px] rounded-[4px] object-cover flex-shrink-0"
                                            />
                                            {/* 气泡 */}
                                            <div className={`flex flex-col ${msg.type === 'me' ? 'items-end' : 'items-start'} max-w-[70%]`}>
                                                <div className={`relative px-3 py-[9px] text-[15px] leading-[1.4] shadow-sm ${
                                                    msg.type === 'me' 
                                                    ? 'bubble-right text-black' 
                                                    : 'bubble-left text-black'
                                                }`} style={{ wordBreak: 'break-all', display: 'inline-block', verticalAlign: 'top' }}>
                                                    {msg.content}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                            {/* 微信底部输入框 Android 完美还原 */}
                            <div className="absolute bottom-0 w-full h-[56px] bg-[#F7F7F7] border-t border-[#E5E5E5] flex items-center px-[8px]">
                                {/* 左侧：语音切换 */}
                                <div className="w-[40px] h-[40px] flex items-center justify-center">
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round">
                                        <circle cx="12" cy="12" r="10"></circle>
                                        <path d="M9 12c0-1.5 1-2.5 3-2.5s3 1 3 2.5-1 2.5-3 2.5-3-1-3-2.5z"></path>
                                        <path d="M12 14.5v2M10 16.5h4"></path>
                                    </svg>
                                </div>
                                
                                {/* 中间：输入框 + 内部麦克风 */}
                                <div className="flex-1 h-[38px] bg-white rounded-[4px] border border-[#E5E5E5] mx-[6px] flex items-center pr-2 relative">
                                    <div className="flex-1 px-3"></div>
                                    <div className="w-[28px] h-full flex items-center justify-center">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round">
                                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
                                            <path d="M19 10v1a7 7 0 0 1-14 0v-1"></path>
                                            <line x1="12" y1="18" x2="12" y2="22"></line>
                                        </svg>
                                    </div>
                                </div>

                                {/* 右侧：表情 + 加号 */}
                                <div className="flex items-center gap-[4px]">
                                    {/* 表情 */}
                                    <div className="w-[38px] h-[38px] flex items-center justify-center">
                                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round">
                                            <circle cx="12" cy="12" r="10"></circle>
                                            <path d="M8 15a4 4 0 0 0 8 0"></path>
                                            <circle cx="9" cy="10" r="1" fill="black" stroke="none"></circle>
                                            <circle cx="15" cy="10" r="1" fill="black" stroke="none"></circle>
                                        </svg>
                                    </div>
                                    {/* 加号 */}
                                    <div className="w-[38px] h-[38px] flex items-center justify-center">
                                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round">
                                            <circle cx="12" cy="12" r="10"></circle>
                                            <line x1="12" y1="7" x2="12" y2="17"></line>
                                            <line x1="7" y1="12" x2="17" y2="12"></line>
                                        </svg>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // 初始化 Lucide 图标
        setTimeout(() => {
            if (window.lucide) {
                window.lucide.createIcons();
            }
        }, 500);
    </script>
</body>
</html>
