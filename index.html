<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信聊天截图生成器 - 2026版</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Heiti SC", "Microsoft YaHei", sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
        }

        /* 模拟手机屏幕容器 */
        .phone-container {
            width: 375px;
            height: 812px;
            background-color: #EDEDED;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 40px;
            border: 12px solid #333;
        }

        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 微信 Android 气泡样式 - 100% 还原参考图 */
        .bubble-left {
            background-color: #FFFFFF;
            border-radius: 4px;
            position: relative;
            color: #000000;
        }
        .bubble-left::before {
            content: "";
            position: absolute;
            left: -5.5px;
            top: 10px;
            width: 0;
            height: 0;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-right: 6px solid #FFFFFF;
        }

        .bubble-right {
            background-color: #95EC69;
            border-radius: 4px;
            position: relative;
            color: #000000;
        }
        .bubble-right::before {
            content: "";
            position: absolute;
            right: -5.5px;
            top: 10px;
            width: 0;
            height: 0;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-left: 6px solid #95EC69;
        }

        /* 微信顶部标题栏 Android 风格 */
        .android-header {
            height: 48px;
            background-color: #EDEDED;
            display: flex;
            align-items: center;
            padding: 0 12px;
            justify-content: space-between;
        }

        .status-bar {
            height: 28px;
            background-color: #EDEDED;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 13px;
            color: #000;
        }

        /* 编辑器侧边栏样式 */
        .editor-sidebar {
            width: 450px;
            background: white;
            height: 100vh;
            overflow-y: auto;
            border-right: 1px solid #e5e7eb;
            padding: 24px;
        }

        /* 移动端优化样式 - 上下排列布局 */
        @media (max-width: 768px) {
            .flex.h-screen {
                flex-direction: column;
                height: auto !important;
                overflow-y: auto !important;
                background-color: #f3f4f6;
            }
            .editor-sidebar {
                width: 100%;
                height: auto;
                border-right: none;
                padding: 16px;
                overflow-y: visible;
                background-color: white;
            }
            .phone-preview-area {
                width: 100%;
                height: auto !important;
                padding: 40px 0 !important;
                background-color: #333;
                display: flex !important;
                flex-direction: column;
                align-items: center;
                overflow-x: hidden;
            }
            .phone-container {
                transform-origin: top center;
                margin: 0 auto;
                border-width: 8px;
                border-radius: 30px;
                flex-shrink: 0;
            }
            .mobile-nav {
                display: none !important;
            }
            .desktop-only {
                display: none !important;
            }
            /* 移动端保存按钮 */
            .mobile-save-btn {
                display: flex !important;
                z-index: 10;
                position: relative;
            }
        }

        .mobile-save-btn {
            display: none;
        }

        /* 列表项动画 */
        .message-item-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dragging {
            opacity: 0.5;
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 模拟微信默认头像
        const DEFAULT_AVATAR_FRIEND = 'https://api.dicebear.com/7.x/avataaars/svg?seed=friend';
        const DEFAULT_AVATAR_ME = 'https://s2.loli.net/2024/03/29/7yX1jIeGq9z4B3V.jpg'; // 用户提供的参考图头像

        function App() {
            // 从 localStorage 加载数据
            const loadData = (key, defaultValue) => {
                try {
                    const saved = localStorage.getItem(key);
                    return saved ? JSON.parse(saved) : defaultValue;
                } catch (err) {
                    console.error(`加载数据失败 [${key}]:`, err);
                    return defaultValue;
                }
            };

            // 基础设置
            const [friendName, setFriendName] = useState(loadData('friendName', '微信好友'));
            const [friendAvatar, setFriendAvatar] = useState(loadData('friendAvatar', DEFAULT_AVATAR_FRIEND));
            const [myAvatar, setMyAvatar] = useState(loadData('myAvatar', DEFAULT_AVATAR_ME));
            const [batteryLevel, setBatteryLevel] = useState(loadData('batteryLevel', 85));

            // 聊天消息列表
            const [messages, setMessages] = useState(loadData('messages', [
                {
                    id: 1,
                    type: 'time',
                    content: '14:25'
                },
                {
                    id: 2,
                    type: 'friend',
                    content: '你好呀！欢迎使用安卓微信截图生成器。',
                },
                {
                    id: 3,
                    type: 'me',
                    content: '这看起来很真实！所有的细节都还原了。',
                }
            ]));

            // 保存到 localStorage
            useEffect(() => {
                try {
                    localStorage.setItem('friendName', JSON.stringify(friendName));
                    localStorage.setItem('friendAvatar', JSON.stringify(friendAvatar));
                    localStorage.setItem('myAvatar', JSON.stringify(myAvatar));
                    localStorage.setItem('messages', JSON.stringify(messages));
                    localStorage.setItem('batteryLevel', JSON.stringify(batteryLevel));
                } catch (err) {
                    if (err.name === 'QuotaExceededError') {
                        console.error('存储空间已满，无法保存更多数据');
                    } else {
                        console.error('保存数据失败:', err);
                    }
                }
            }, [friendName, friendAvatar, myAvatar, messages]);

            // 编辑状态（顶部表单）
            const [editingId, setEditingId] = useState(null);
            
            // 内联编辑状态（列表直接修改）
            const [inlineEditingId, setInlineEditingId] = useState(null);
            const [inlineEditValue, setInlineEditValue] = useState('');

            // 新消息表单状态
            const [newMessage, setNewMessage] = useState({
                type: 'friend',
                content: '',
            });

            const previewRef = useRef(null);

            // 处理头像上传并压缩
            const handleAvatarUpload = (e, target) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        // 创建 Canvas 进行压缩
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 200; // 头像不需要太大，200px 足够
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_SIZE) {
                                height *= MAX_SIZE / width;
                                width = MAX_SIZE;
                            }
                        } else {
                            if (height > MAX_SIZE) {
                                width *= MAX_SIZE / height;
                                height = MAX_SIZE;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // 导出为压缩后的 Base64
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.8);
                        
                        if (target === 'friend') setFriendAvatar(compressedBase64);
                        else setMyAvatar(compressedBase64);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            // 添加或保存消息
            const saveMessage = () => {
                if (!newMessage.content.trim()) return;
                
                if (editingId) {
                    setMessages(messages.map(msg => 
                        msg.id === editingId ? { ...newMessage, id: editingId } : msg
                    ));
                    setEditingId(null);
                } else {
                    setMessages([...messages, { ...newMessage, id: Date.now() }]);
                }
                
                setNewMessage({ 
                    ...newMessage, 
                    content: '',
                });
            };

            // 编辑消息（顶部表单）
            const startEdit = (msg) => {
                setNewMessage({ ...msg });
                setEditingId(msg.id);
                // 同步取消内联编辑
                setInlineEditingId(null);
            };

            // 取消编辑（顶部表单）
            const cancelEdit = () => {
                setEditingId(null);
                setNewMessage({
                    ...newMessage,
                    content: '',
                });
            };

            // 开始内联编辑
            const startInlineEdit = (msg) => {
                setInlineEditingId(msg.id);
                setInlineEditValue(msg.content);
                // 也要同步取消顶部表单的编辑状态，防止冲突
                setEditingId(null);
            };

            // 实时同步内联编辑
            const handleInlineChange = (id, value) => {
                setInlineEditValue(value);
                setMessages(messages.map(msg => 
                    msg.id === id ? { ...msg, content: value } : msg
                ));
            };

            // 退出内联编辑
            const exitInlineEdit = () => {
                setInlineEditingId(null);
                setInlineEditValue('');
            };

            /**
             * 智能格式化时间逻辑 - 严格对标安卓微信
             * @param {string} input - 原始输入的日期时间字符串，如 "3月28日 15:10"
             * @param {boolean} isSeparator - 是否作为分割线显示 (true: 不带时分, false: 带时分)
             */
            const formatWeChatTime = (input, isSeparator = false) => {
                if (!input) return '';
                
                // 1. 尝试解析输入内容 (支持 "3月28日 15:10" 或 "3月28日15:10")
                const dateMatch = input.match(/(?:(\d+)月)?(\d+)日?\s*(\d{1,2})[:：](\d{2})/);
                if (!dateMatch) return input; // 解析失败则返回原样

                const now = new Date();
                const currentYear = now.getFullYear();
                const month = dateMatch[1] ? parseInt(dateMatch[1]) - 1 : now.getMonth();
                const day = parseInt(dateMatch[2]);
                const hour = parseInt(dateMatch[3]);
                const minute = parseInt(dateMatch[4]);

                const targetDate = new Date(currentYear, month, day, hour, minute);
                
                // 计算日期差异
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const thatDay = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate());
                const diffTime = today - thatDay;
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

                // 自然周逻辑 (周一为一周开始)
                const getMonday = (d) => {
                    const date = new Date(d);
                    const day = date.getDay();
                    const diff = date.getDate() - day + (day === 0 ? -6 : 1);
                    return new Date(date.setDate(diff)).setHours(0, 0, 0, 0);
                };
                const currentMonday = getMonday(now);
                const isThisNaturalWeek = thatDay >= currentMonday;

                const timeStr = `${hour.toString().padStart(2, '0')}:${minute.toString().padStart(2, '0')}`;
                const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
                const weekStr = weekDays[targetDate.getDay()];

                let datePart = '';
                if (diffDays === 0) {
                    datePart = isSeparator ? '今天' : '';
                } else if (diffDays === 1) {
                    datePart = '昨天';
                } else if (isThisNaturalWeek) {
                    datePart = weekStr;
                } else {
                    datePart = `${month + 1}月${day}日`;
                }

                if (isSeparator) return datePart;
                return datePart ? `${datePart} ${timeStr}`.trim() : timeStr;
            };

            // 响应式缩放逻辑 - 自动适配任何手机屏幕尺寸
            const [scale, setScale] = useState(1);
            useEffect(() => {
                const handleResize = () => {
                    if (window.innerWidth <= 768) {
                        // 移动端：根据屏幕宽度动态计算比例，预留左右边距
                        const availableWidth = window.innerWidth - 40; 
                        const newScale = Math.min(1, availableWidth / 375);
                        setScale(newScale);
                    } else {
                        setScale(1);
                    }
                };

                handleResize();
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            // 移动消息
            const moveMessage = (index, direction) => {
                const newMessages = [...messages];
                const targetIndex = index + direction;
                if (targetIndex < 0 || targetIndex >= newMessages.length) return;
                [newMessages[index], newMessages[targetIndex]] = [newMessages[targetIndex], newMessages[index]];
                setMessages(newMessages);
            };

            // 删除消息
            const deleteMessage = (id) => {
                setMessages(messages.filter(msg => msg.id !== id));
            };

            // 拖拽排序逻辑
            const [draggedItemIndex, setDraggedItemIndex] = useState(null);

            const onDragStart = (e, index) => {
                setDraggedItemIndex(index);
                e.dataTransfer.effectAllowed = 'move';
                // 为拖拽中的元素添加透明度
                e.target.style.opacity = '0.5';
            };

            const onDragEnd = (e) => {
                e.target.style.opacity = '1';
                setDraggedItemIndex(null);
            };

            const onDragOver = (e, index) => {
                e.preventDefault();
                if (draggedItemIndex === null || draggedItemIndex === index) return;
                
                const newMessages = [...messages];
                const item = newMessages.splice(draggedItemIndex, 1)[0];
                newMessages.splice(index, 0, item);
                
                setMessages(newMessages);
                setDraggedItemIndex(index);
            };

            // 按日期分组消息 (保留逻辑以备后用，目前 messages 为扁平数组)
            const groupedMessages = Array.isArray(messages) ? messages : [];

            return (
                <div className="flex h-screen w-full bg-gray-100 overflow-hidden relative">
                    {/* 左侧：编辑面板 */}
                    <div className="editor-sidebar no-scrollbar">
                        {/* 极简高级 Logo 区域 */}
                        <div className="flex flex-col items-center justify-center mb-10 mt-2">
                            <div className="w-16 h-16 bg-gradient-to-br from-green-500 to-green-600 rounded-2xl flex items-center justify-center shadow-lg shadow-green-200 mb-4 transition-transform hover:scale-105 duration-300">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                                    <circle cx="9" cy="9" r="0.5" fill="white" stroke="none"></circle>
                                    <circle cx="12" cy="9" r="0.5" fill="white" stroke="none"></circle>
                                    <circle cx="15" cy="9" r="0.5" fill="white" stroke="none"></circle>
                                </svg>
                            </div>
                            <h1 className="text-xl font-bold text-gray-800 tracking-tight">微信截图生成器</h1>
                            <div className="h-1 w-8 bg-green-500 rounded-full mt-2 opacity-50"></div>
                        </div>
                        
                        {/* 基础设置 */}
                        <section className="mb-4 p-3 md:p-4 bg-gray-50 rounded-xl border border-gray-200">
                            <h2 className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">基础设置</h2>
                            <div className="space-y-3">
                                <div>
                                    <label className="block text-xs font-medium text-gray-700 mb-1">好友昵称</label>
                                    <input 
                                        type="text" 
                                        className="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 outline-none text-sm"
                                        value={friendName}
                                        onChange={(e) => setFriendName(e.target.value)}
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-medium text-gray-700 mb-1 flex justify-between">
                                        <span>电量显示</span>
                                        <span className="text-green-600 font-bold">{batteryLevel}%</span>
                                    </label>
                                    <input 
                                        type="range" 
                                        min="1" 
                                        max="100" 
                                        step="1"
                                        className="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-green-600"
                                        value={batteryLevel}
                                        onChange={(e) => setBatteryLevel(parseInt(e.target.value))}
                                    />
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="block text-xs font-medium text-gray-700 mb-1">好友头像</label>
                                        <div className="flex items-center gap-2">
                                            <img src={friendAvatar} className="w-10 h-10 rounded-md object-cover border" />
                                            <input 
                                                type="file" 
                                                accept="image/*"
                                                className="hidden" 
                                                id="friend-avatar-input"
                                                onChange={(e) => handleAvatarUpload(e, 'friend')}
                                            />
                                            <label htmlFor="friend-avatar-input" className="text-[10px] bg-white border border-gray-300 px-2 py-1.5 rounded cursor-pointer hover:bg-gray-50">更换</label>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-medium text-gray-700 mb-1">我的头像</label>
                                        <div className="flex items-center gap-2">
                                            <img src={myAvatar} className="w-10 h-10 rounded-md object-cover border" />
                                            <input 
                                                type="file" 
                                                accept="image/*"
                                                className="hidden" 
                                                id="my-avatar-input"
                                                onChange={(e) => handleAvatarUpload(e, 'me')}
                                            />
                                            <label htmlFor="my-avatar-input" className="text-[10px] bg-white border border-gray-300 px-2 py-1.5 rounded cursor-pointer hover:bg-gray-50">更换</label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* 添加/编辑消息 */}
                        <section className="mb-4 p-3 md:p-4 bg-gray-50 rounded-xl border border-gray-200">
                            <h2 className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">
                                {editingId ? '编辑消息' : '添加消息'}
                            </h2>
                            <div className="space-y-3">
                                <div className="flex gap-2">
                                    <button 
                                        onClick={() => setNewMessage({...newMessage, type: 'friend'})}
                                        className={`flex-1 py-2 text-xs rounded-md border transition-all ${newMessage.type === 'friend' ? 'bg-green-600 text-white border-green-600 shadow-sm' : 'bg-white text-gray-600 border-gray-300'}`}
                                    >对方</button>
                                    <button 
                                        onClick={() => setNewMessage({...newMessage, type: 'me'})}
                                        className={`flex-1 py-2 text-xs rounded-md border transition-all ${newMessage.type === 'me' ? 'bg-green-600 text-white border-green-600 shadow-sm' : 'bg-white text-gray-600 border-gray-300'}`}
                                    >我</button>
                                    <button 
                                        onClick={() => setNewMessage({...newMessage, type: 'time'})}
                                        className={`flex-1 py-2 text-xs rounded-md border transition-all ${newMessage.type === 'time' ? 'bg-gray-600 text-white border-gray-600 shadow-sm' : 'bg-white text-gray-600 border-gray-300'}`}
                                    >时间</button>
                                </div>
                                <div>
                                    <textarea 
                                        className="w-full p-2.5 border border-gray-300 rounded-md h-20 outline-none focus:ring-2 focus:ring-green-500 text-sm"
                                        placeholder={newMessage.type === 'time' ? "输入时间或日期 (如: 14:25)" : "输入消息内容..."}
                                        value={newMessage.content}
                                        onChange={(e) => setNewMessage({...newMessage, content: e.target.value})}
                                    />
                                </div>
                                <div className="flex gap-2">
                                    {editingId && (
                                        <button 
                                            onClick={cancelEdit}
                                            className="flex-1 py-2 bg-gray-200 text-gray-700 rounded-md text-sm font-medium hover:bg-gray-300 transition-colors"
                                        >取消</button>
                                    )}
                                    <button 
                                        onClick={saveMessage}
                                        className="flex-[2] py-2 bg-green-600 text-white rounded-md text-sm font-medium hover:bg-green-700 transition-colors shadow-sm"
                                    >
                                        {editingId ? '保存修改' : '添加消息'}
                                    </button>
                                </div>
                            </div>
                        </section>

                        {/* 消息管理 */}
                        <section className="mb-4">
                            <h2 className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3 flex justify-between items-center">
                                消息列表 (点击内容修改)
                                <button onClick={() => setMessages([])} className="text-[10px] text-red-500 hover:underline">清空全部</button>
                            </h2>
                            <div className="space-y-2">
                                {messages.map((msg, index) => (
                                    <div 
                                        key={msg.id} 
                                        draggable={inlineEditingId !== msg.id}
                                        onDragStart={(e) => onDragStart(e, index)}
                                        onDragEnd={onDragEnd}
                                        onDragOver={(e) => onDragOver(e, index)}
                                        className={`p-2.5 bg-white rounded-xl flex justify-between items-center group transition-all duration-300 message-item-transition ${
                                            draggedItemIndex === index ? 'dragging shadow-none scale-95' : 'shadow-sm hover:shadow-md'
                                        } ${
                                            editingId === msg.id || inlineEditingId === msg.id 
                                            ? 'ring-2 ring-green-500 shadow-lg shadow-green-100' 
                                            : ''
                                        } ${inlineEditingId !== msg.id ? 'cursor-move' : ''}`}
                                    >
                                        <div className="flex-1 overflow-hidden">
                                            <div className="flex items-center gap-2 mb-1">
                                                <div className="text-gray-200 desktop-only">
                                                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="9" cy="5" r="1.2"/><circle cx="9" cy="12" r="1.2"/><circle cx="9" cy="19" r="1.2"/><circle cx="15" cy="5" r="1.2"/><circle cx="15" cy="12" r="1.2"/><circle cx="15" cy="19" r="1.2"/></svg>
                                                </div>
                                                {/* 列表头像 */}
                                                {(msg.type === 'me' || msg.type === 'friend') && (
                                                    <img 
                                                        src={msg.type === 'me' ? myAvatar : friendAvatar} 
                                                        className="w-5 h-5 rounded-sm object-cover shadow-sm"
                                                    />
                                                )}
                                                <span className={`text-[10px] px-1.5 py-0.5 rounded-full font-medium ${
                                                    msg.type === 'me' ? 'bg-green-50 text-green-600' : 
                                                    msg.type === 'friend' ? 'bg-gray-50 text-gray-500' : 
                                                    'bg-blue-50 text-blue-500'
                                                }`}>
                                                    {msg.type === 'me' ? '我' : msg.type === 'friend' ? '对方' : '时间'}
                                                </span>
                                            </div>
                                            
                                            {inlineEditingId === msg.id ? (
                                                <div className="mt-0.5">
                                                    <textarea 
                                                        autoFocus
                                                        className="w-full p-2 border-0 rounded-lg text-sm focus:outline-none bg-green-50 transition-colors"
                                                        value={inlineEditValue}
                                                        onChange={(e) => handleInlineChange(msg.id, e.target.value)}
                                                        onBlur={exitInlineEdit}
                                                        onKeyDown={(e) => {
                                                            if (e.key === 'Enter' && !e.shiftKey) {
                                                                e.preventDefault();
                                                                exitInlineEdit();
                                                            }
                                                            if (e.key === 'Escape') {
                                                                exitInlineEdit();
                                                            }
                                                        }}
                                                        rows={Math.max(1, inlineEditValue.split('\n').length)}
                                                    />
                                                </div>
                                            ) : (
                                                <p 
                                                    className="text-[14px] text-gray-600 break-all pl-1 cursor-text hover:text-green-600 transition-colors line-clamp-2 leading-relaxed"
                                                    onClick={() => startInlineEdit(msg)}
                                                    title="点击直接修改"
                                                >
                                                    {msg.type === 'time' ? formatWeChatTime(msg.content, true) : msg.content}
                                                </p>
                                            )}
                                        </div>
                                        
                                        {inlineEditingId !== msg.id && (
                                            <div className="flex gap-1 items-center ml-2">
                                                <button 
                                                    onClick={() => deleteMessage(msg.id)}
                                                    className="text-gray-200 hover:text-red-400 p-1.5 transition-colors"
                                                    title="删除"
                                                >
                                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                ))}
                                {messages.length === 0 && (
                                    <div className="text-center py-10 text-gray-400 text-sm italic">
                                        暂无消息，请在上方添加
                                    </div>
                                )}
                            </div>

                            {/* 消息管理底部间距 */}
                            <div className="h-20"></div>
                        </section>
                    </div>

                    {/* 右侧：预览面板 */}
                    <div className="flex-1 phone-preview-area items-center justify-center bg-[#333]">
                        {/* 动态缩放包裹层：根据 JS 计算的比例，在任何宽度的手机屏幕上都能实现像素级水平居中 */}
                        <div style={{ 
                            width: 375 * scale, 
                            height: 812 * scale, 
                            position: 'relative',
                            margin: '0 auto',
                            transition: 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)'
                        }}>
                            <div 
                                className="phone-container" 
                                ref={previewRef}
                                style={{ 
                                    transform: `scale(${scale})`,
                                    transformOrigin: 'top left',
                                    position: 'absolute',
                                    left: 0,
                                    top: 0,
                                    margin: 0 // 覆盖默认 margin
                                }}
                            >
                                {/* 状态栏模拟 */}
                                <div className="status-bar pt-1 px-4">
                                    <span className="font-medium text-[13.5px] tracking-tight">{new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false })}</span>
                                    <div className="flex items-center gap-1.5">
                                        {/* 5G 信号图标 */}
                                        <div className="flex items-end gap-[1.5px] h-[10px] mb-[2px]">
                                            <div className="w-[2px] h-[40%] bg-black"></div>
                                            <div className="w-[2px] h-[60%] bg-black"></div>
                                            <div className="w-[2px] h-[80%] bg-black"></div>
                                            <div className="w-[2px] h-[100%] bg-black"></div>
                                        </div>
                                        <span className="text-[10px] font-bold leading-none -mt-[1px]">5G</span>
                                        {/* 电池图标 */}
                                        <div className="w-[20px] h-[10px] border border-black rounded-[2px] p-[0.5px] flex items-center relative ml-0.5">
                                            <div className="bg-black h-full rounded-[0.5px]" style={{ width: `${batteryLevel}%` }}></div>
                                            <div className="absolute -right-[2.5px] top-[3px] w-[1.5px] h-[4px] bg-black rounded-r-[1px]"></div>
                                        </div>
                                    </div>
                                </div>

                                {/* 微信顶部导航栏 Android 极致还原 - 稳固对等布局 */}
                                <div className="android-header h-[48px] flex items-center px-2">
                                    {/* 左侧容器：固定宽度 50px */}
                                    <div className="w-[50px] flex-shrink-0 flex items-center pl-1">
                                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#000" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round" className="cursor-pointer">
                                            <polyline points="15 18 9 12 15 6"></polyline>
                                        </svg>
                                    </div>
                                    {/* 中间容器：填充剩余空间并居中 */}
                                    <div className="flex-1 flex justify-center items-center overflow-hidden px-2">
                                        <span className="text-[18px] font-medium text-black whitespace-nowrap overflow-hidden text-ellipsis text-center tracking-[-0.015em]">{friendName}</span>
                                    </div>
                                    {/* 右侧容器：固定宽度 50px (与左侧相等以实现绝对居中) */}
                                    <div className="w-[50px] flex-shrink-0 flex justify-end items-center pr-1">
                                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                                            <circle cx="5" cy="12" r="1.2" fill="black"/>
                                            <circle cx="12" cy="12" r="1.2" fill="black"/>
                                            <circle cx="19" cy="12" r="1.2" fill="black"/>
                                        </svg>
                                    </div>
                                </div>

                                {/* 聊天内容区 */}
                                <div className="h-[calc(100%-76px-56px)] overflow-y-auto no-scrollbar px-3 py-4 space-y-4 flex flex-col bg-[#EDEDED]">
                                    {messages.map((msg, index) => {
                                        if (msg.type === 'time') {
                                            return (
                                                <div key={msg.id} className="flex items-center justify-center my-4">
                                                    <span 
                                                        className="text-[12px] text-[#B2B2B2] font-normal"
                                                        style={{ letterSpacing: '0.03em', wordSpacing: '0.15em' }}
                                                    >
                                                        {formatWeChatTime(msg.content)}
                                                    </span>
                                                </div>
                                            );
                                        }
                                        return (
                                            <div key={msg.id} className={`flex ${msg.type === 'me' ? 'flex-row-reverse' : 'flex-row'} items-start gap-2 mb-4`}>
                                                {/* 头像 - Android 为圆角矩形 40x40 */}
                                                <img 
                                                    src={msg.type === 'me' ? myAvatar : friendAvatar} 
                                                    className="w-[40px] h-[40px] rounded-[4px] object-cover flex-shrink-0"
                                                />
                                                {/* 气泡 */}
                                                <div className={`flex flex-col ${msg.type === 'me' ? 'items-end' : 'items-start'} max-w-[72%]`}>
                                                    <div className={`relative px-3 py-[9px] text-[15.5px] leading-[1.45] shadow-sm ${
                                                        msg.type === 'me' 
                                                        ? 'bubble-right text-black' 
                                                        : 'bubble-left text-black'
                                                    }`} style={{ wordBreak: 'break-all', display: 'inline-block', verticalAlign: 'top' }}>
                                                        {msg.content}
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                {/* 微信底部输入框 Android 极致还原 */}
                            <div className="absolute bottom-0 w-full h-[56px] bg-[#F7F7F7] border-t border-[#E5E5E5] flex items-center px-[6px]">
                                {/* 左侧：语音按钮 */}
                                <div className="w-[44px] h-[44px] flex items-center justify-center">
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" strokeWidth="1.2">
                                        <circle cx="12" cy="12" r="10.5"></circle>
                                        <path d="M10 9l-2 2v2l2 2v-6z" fill="black" stroke="none"></path>
                                        <path d="M12 9.5c1 1 1 4 0 5M14.5 7c2 2 2 8 0 10" strokeWidth="1.2" strokeLinecap="round"></path>
                                    </svg>
                                </div>
                                
                                {/* 中间：输入框 + 内部麦克风 */}
                                <div className="flex-1 h-[38px] bg-white rounded-[4px] border border-[#E5E5E5] mx-[4px] flex items-center pr-1 relative">
                                    <div className="flex-1"></div>
                                    <div className="w-[32px] h-full flex items-center justify-center">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="1.2">
                                            <path d="M12 4a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V7a3 3 0 0 0-3-3z"></path>
                                            <path d="M19 10v1a7 7 0 0 1-14 0v-1" strokeLinecap="round"></path>
                                            <line x1="12" y1="18" x2="12" y2="21"></line>
                                        </svg>
                                    </div>
                                </div>

                                {/* 右侧：表情 + 加号 */}
                                <div className="flex items-center">
                                    {/* 表情 */}
                                    <div className="w-[42px] h-[42px] flex items-center justify-center">
                                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" strokeWidth="1.2">
                                            <circle cx="12" cy="12" r="10.5"></circle>
                                            <circle cx="9" cy="10.5" r="1.2" fill="black" stroke="none"></circle>
                                            <circle cx="15" cy="10.5" r="1.2" fill="black" stroke="none"></circle>
                                            <path d="M8.5 14.5c1 1.5 3 2.2 4.5 1.5s2.5-1.5 2.5-1.5" strokeLinecap="round"></path>
                                        </svg>
                                    </div>
                                    {/* 加号 */}
                                    <div className="w-[42px] h-[42px] flex items-center justify-center">
                                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" strokeWidth="1.2">
                                            <circle cx="12" cy="12" r="10.5"></circle>
                                            <line x1="12" y1="7.5" x2="12" y2="16.5"></line>
                                            <line x1="7.5" y1="12" x2="16.5" y2="12"></line>
                                        </svg>
                                    </div>
                                </div>
                            </div>
                            </div>
                        </div>

                        {/* 橙色提示气泡 */}
                        <div className="mt-8 mb-12 flex flex-col items-center">
                            {/* 橙色气泡框 */}
                            <div className="relative bg-[#FF9500] text-white px-6 py-3 rounded-[18px] shadow-xl max-w-[280px] text-center border border-[#FF9500]">
                                <p className="text-[14px] font-bold leading-normal tracking-wide">
                                    截图使用，不要截到底部输入框（不一样），截取聊天内容即可。
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // 初始化 Lucide 图标
        setTimeout(() => {
            if (window.lucide) {
                window.lucide.createIcons();
            }
        }, 500);
    </script>
</body>
</html>
